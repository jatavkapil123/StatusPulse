name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # runs after CI passes via branch protection

    permissions:
      contents: read
      packages: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set lowercase image name
        id: image
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ steps.image.outputs.name }}:latest
            ${{ steps.image.outputs.name }}:${{ github.sha }}

      - name: Encode files for transfer
        id: encode
        run: |
          # Build a server-side compose without 'build:' context (server has no source)
          sed '/^\s*build:/d' docker-compose.yml > /tmp/server-compose.yml
          COMPOSE=$(base64 -w0 /tmp/server-compose.yml)
          echo "compose=${COMPOSE}" >> $GITHUB_OUTPUT

          DEPLOY=$(base64 -w0 scripts/deploy.sh)
          echo "deploy=${DEPLOY}" >> $GITHUB_OUTPUT

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Setup server and deploy
        env:
          COMPOSE_B64: ${{ steps.encode.outputs.compose }}
          DEPLOY_B64: ${{ steps.encode.outputs.deploy }}
          IMAGE_TAG: ${{ github.sha }}
          GHCR_IMAGE: ghcr.io/jatavkapil123/statuspulse
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash << 'ENDSSH'
            # Install Docker if not present
            if ! command -v docker &> /dev/null; then
              sudo apt-get update -qq
              sudo apt-get install -y docker.io docker-compose-plugin
              sudo usermod -aG docker $USER
            fi

            # Setup app directory
            sudo mkdir -p /opt/statuspulse/scripts
            sudo chown -R $USER:$USER /opt/statuspulse

            # Decode and write files
            echo "$COMPOSE_B64" | base64 -d > /opt/statuspulse/docker-compose.yml
            echo "$DEPLOY_B64"  | base64 -d > /opt/statuspulse/scripts/deploy.sh
            chmod +x /opt/statuspulse/scripts/deploy.sh

            # Init .env if missing
            [ -f /opt/statuspulse/.env ] || touch /opt/statuspulse/.env

            # Run deploy
            export IMAGE_TAG="$IMAGE_TAG"
            export GHCR_IMAGE="$GHCR_IMAGE"
            cd /opt/statuspulse && bash scripts/deploy.sh
          ENDSSH

      - name: Post-deployment health check
        id: health
        run: |
          sleep 10
          STATUS=$(curl -sf http://${{ secrets.DEPLOY_HOST }}:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "failed")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "healthy" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: `✅ Deploy succeeded for \`${{ github.sha }}\`. Health check: healthy.`
            }).catch(() => {
              console.log('No issue to comment on, skipping.');
            });

      - name: Notify failure and rollback
        if: failure()
        env:
          DEPLOY_B64: ${{ steps.encode.outputs.deploy }}
        run: |
          ssh -i ~/.ssh/deploy_key -p ${{ secrets.DEPLOY_SSH_PORT }} ${{ secrets.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} bash << 'ENDSSH'
            echo "$DEPLOY_B64" | base64 -d > /opt/statuspulse/scripts/deploy.sh
            chmod +x /opt/statuspulse/scripts/deploy.sh
            cd /opt/statuspulse && bash scripts/deploy.sh rollback
          ENDSSH

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: `❌ Deploy FAILED for \`${{ github.sha }}\`. Rollback triggered.`
            }).catch(() => {
              console.log('No issue to comment on, skipping.');
            });
