name: Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    needs: []   # runs after CI passes via branch protection

    permissions:
      contents: read
      packages: write
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:${{ github.sha }}

      - name: Deploy to server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            export IMAGE_TAG=${{ github.sha }}
            export GHCR_IMAGE=ghcr.io/${{ github.repository }}
            bash /opt/statuspulse/scripts/deploy.sh

      - name: Post-deployment health check
        id: health
        run: |
          sleep 10
          STATUS=$(curl -sf https://${{ secrets.DEPLOY_HOST }}/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || echo "failed")
          echo "status=$STATUS" >> $GITHUB_OUTPUT
          if [ "$STATUS" != "healthy" ]; then
            echo "Health check failed: $STATUS"
            exit 1
          fi

      - name: Notify success
        if: success()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: `✅ Deploy succeeded for \`${{ github.sha }}\`. Health check: healthy.`
            }).catch(() => {
              console.log('No issue to comment on, skipping.');
            });

      - name: Notify failure and rollback
        if: failure()
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.DEPLOY_HOST }}
          username: ${{ secrets.DEPLOY_USER }}
          key: ${{ secrets.DEPLOY_SSH_KEY }}
          port: ${{ secrets.DEPLOY_SSH_PORT }}
          script: |
            echo "Health check failed — rolling back..."
            bash /opt/statuspulse/scripts/deploy.sh rollback

      - name: Comment on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number || 1,
              body: `❌ Deploy FAILED for \`${{ github.sha }}\`. Rollback triggered.`
            }).catch(() => {
              console.log('No issue to comment on, skipping.');
            });
