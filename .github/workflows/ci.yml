name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install ruff
        run: pip install ruff==0.1.6

      - name: Lint with ruff
        run: ruff check app/main.py

      - name: Scan Dockerfile with hadolint
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Copy .env
        run: cp .env.example .env

      - name: Build Docker image
        run: docker compose build

      - name: Start full stack
        run: docker compose up -d

      - name: Wait for services to be healthy
        run: |
          echo "Waiting for stack to be ready..."
          for i in $(seq 1 30); do
            STATUS=$(curl -s http://localhost:8000/health | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('status',''))" 2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              echo "Stack is healthy."
              break
            fi
            echo "Attempt $i: not ready yet..."
            sleep 3
          done

      - name: Run integration tests
        run: bash tests/test_integration.sh

      - name: Trivy scan (image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: statuspulse_api:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: tests/results/trivy-report.txt

      - name: Tear down stack
        if: always()
        run: docker compose down --volumes

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: tests/results/
          if-no-files-found: ignore
